<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личный кабинет — ProYoga</title>
    <!-- Встроенные CSS стили для гарантированного скрытия элементов без внешнего Bootstrap -->
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; color: #212529; }
        .d-none { display: none !important; }
        .container { max-width: 1140px; margin: 30px auto; padding: 0 20px; }
        .nav-box { background-color: #212529; padding: 15px 0; }
        .nav-container { max-width: 1140px; margin: 0 auto; padding: 0 20px; display: flex; gap: 20px; }
        .nav-link { color: rgba(255,255,255,.55); text-decoration: none; font-weight: bold; }
        .nav-link.active { color: #fff; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.04); border: 1px solid #e9ecef; margin-bottom: 20px; }
        .text-center { text-align: center; }
        .text-danger { color: #dc3545; }
        .text-success { color: #198754; }
        .text-muted { color: #6c757d; font-size: 14px; }
        .btn { display: inline-block; padding: 10px 20px; font-weight: bold; text-decoration: none; border-radius: 6px; border: none; cursor: pointer; text-align: center; }
        .btn-success { background-color: #198754; color: white; }
        .btn-primary { background-color: #0d6efd; color: white; }
        .btn-outline-success { background: none; border: 1px solid #198754; color: #198754; }
        .btn-outline-success:hover { background: #198754; color: white; }
    </style>
</head>
<body>

    <!-- Меню навигации -->
    <div class="nav-box">
        <div class="nav-container">
            <a class="nav-link" href="{% url 'home' %}" style="color: #fff; margin-right: 20px;">🧘 ProYoga Студия</a>
            <a class="nav-link" href="{% url 'home' %}">Главная</a>
            <a class="nav-link active" href="{% url 'profile_page' %}">Личный кабинет</a>
        </div>
    </div>

    <div class="container">
        <!-- Блок 3 задания 4 и 5: Обработка ошибок 401/403 для неавторизованных пользователей -->
        <div id="unauthorized-block" class="d-none text-center card">
            <h3 class="text-danger">Доступ ограничен</h3>
            <p class="text-muted">Для просмотра личного кабинета и истории заказов необходимо авторизоваться в системе.</p>
            <a href="{% url 'login' %}" class="btn btn-success" style="margin-top: 15px; padding: 12px 30px;">Войти в систему</a>
        </div>
        <!-- Основной контейнер личного кабинета (показывается только вошедшим пользователям) -->
        <div id="profile-content" class="d-none" style="display: flex; gap: 30px; align-items: flex-start;">
            
            <!-- Блок 1 задания 4: Блок "Профиль" -->
            <div style="flex: 1; min-width: 350px;" class="card">
                <h4 style="margin-top: 0; color: #0d6efd;">👤 Мой профиль</h4>
                <div id="profile-alert" class="d-none" style="padding: 10px; margin-bottom: 15px; border-radius: 4px; font-weight: bold; text-align: center;"></div>
                
                <form id="profile-form">
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;">Имя пользователя (Логин):</label>
                        <input type="text" id="username" style="width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; background-color: #f1f3f5;" readonly>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;">Электронная почта (Email):</label>
                        <input type="email" id="email" style="width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; background-color: #f1f3f5;" readonly>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;">ФИО:</label>
                        <input type="text" id="full_name" style="width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box;" required placeholder="Введите ваше ФИО">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;">Номер телефона:</label>
                        <input type="tel" id="phone" style="width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box;" required placeholder="+375 (XX) XXX-XX-XX">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;">Адрес проживания:</label>
                        <textarea id="address" style="width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box;" rows="3" required placeholder="Город, улица, дом, квартира"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Сохранить изменения</button>
                </form>
            </div>

            <!-- Блок 2 задания 4: Блок "Мои заказы" (Таблица) -->
            <div style="flex: 1.5; min-width: 450px;" class="card">
                <h4 style="margin-top: 0; color: #198754;">📦 История заказов</h4>
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="background-color: #f1f3f5; border-bottom: 2px solid #dee2e6;">
                            <th style="padding: 12px 8px;">№ Заказа</th>
                            <th style="padding: 12px 8px;">Дата оформления</th>
                            <th style="padding: 12px 8px;">Сумма (BYN)</th>
                            <th style="padding: 12px 8px;">Действие</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody">
                        <!-- Строки заказов будут генерироваться через JS -->
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- Модальное окно для деталей заказа -->
    <div id="orderModal" class="d-none" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000;">
        <div style="background: white; padding: 25px; border-radius: 12px; width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
            <h5 id="modal-order-title" style="margin-top: 0; color: #198754; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Детали заказа</h5>
            <ul id="modal-items-list" style="list-style: none; padding: 0; margin: 15px 0; max-height: 200px; overflow-y: auto;">
                <!-- Элементы добавятся через JS -->
            </ul>
            <div style="text-align: right; font-weight: bold; font-size: 18px; color: #198754; border-top: 1px solid #eee; pt-10px; margin-bottom: 15px; padding-top: 10px;">
                Итого: <span id="modal-total-cost">0.00</span> BYN
            </div>
            <button class="btn btn-success" style="width: 100%;" onclick="closeModal()">Закрыть окно</button>
        </div>
    </div>
    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Единый глобальный обработчик HTTP статусов 401 и 403 на клиенте (Задание 5)
        function handleAuthErrors(response) {
            if (response.status === 401 || response.status === 403) {
                document.getElementById('profile-content').style.display = 'none'; // Жестко скрываем контент
                document.getElementById('unauthorized-block').classList.remove('d-none'); // Показываем блок ошибки
                throw new Error(`Ошибка доступа к API: Код статуса ${response.status}`);
            }
            return response.json();
        }

        document.addEventListener("DOMContentLoaded", function() {
            fetch('/api/me/')
                .then(response => handleAuthErrors(response))
                .then(profile => {
                    document.getElementById('profile-content').classList.remove('d-none');
                    document.getElementById('username').value = profile.username;
                    document.getElementById('email').value = profile.email;
                    document.getElementById('full_name').value = profile.full_name || '';
                    document.getElementById('phone').value = profile.phone || '';
                    document.getElementById('address').value = profile.address || '';
                    
                    loadUserOrders();
                })
                .catch(err => console.log("Проверка авторизации: ", err.message));
        });

        document.getElementById('profile-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const alertBox = document.getElementById('profile-alert');
            
            const updatedData = {
                full_name: document.getElementById('full_name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };

            fetch('/api/me/', {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify(updatedData)
            })
            .then(response => handleAuthErrors(response))
            .then(data => {
                alertBox.classList.remove('d-none');
                alertBox.style.backgroundColor = '#d1e7dd';
                alertBox.style.color = '#0f5132';
                alertBox.innerText = "✨ Профиль успешно обновлен!";
            })
            .catch(err => {
                alertBox.classList.remove('d-none');
                alertBox.style.backgroundColor = '#f8d7da';
                alertBox.style.color = '#842029';
                alertBox.innerText = "❌ Ошибка при обновлении профиля.";
            });
        });

        function loadUserOrders() {
            fetch('/api/orders/')
                .then(response => handleAuthErrors(response))
                .then(orders => {
                    const tbody = document.getElementById('orders-tbody');
                    tbody.innerHTML = '';
                    
                    if (orders.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#6c757d;padding:20px;">У вас пока нет оформленных заказов.</td></tr>';
                        return;
                    }

                    orders.forEach(order => {
                        const date = new Date(order.created_at).toLocaleDateString('ru-RU');
                        const tr = document.createElement('tr');
                        tr.style.borderBottom = '1px solid #dee2e6';
                        tr.innerHTML = `
                            <td style="padding:12px 8px;font-weight:bold;">#${order.id}</td>
                            <td style="padding:12px 8px;">${date}</td>
                            <td style="padding:12px 8px;color:#198754;font-weight:bold;">${order.total_cost}</td>
                            <td style="padding:12px 8px;">
                                <button class="btn btn-outline-success" style="padding:5px 10px;font-size:12px;" onclick="showOrderDetails(${order.id})">Подробнее</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                });
        }

        function showOrderDetails(orderId) {
            fetch(`/api/orders/${orderId}/`)
                .then(response => handleAuthErrors(response))
                .then(order => {
                    document.getElementById('modal-order-title').innerText = `Детали заказа №${order.id}`;
                    document.getElementById('modal-total-cost').innerText = order.total_cost;
                    
                    const itemsList = document.getElementById('modal-items-list');
                    itemsList.innerHTML = '';
                    
                    order.items.forEach(item => {
                        const li = document.createElement('li');
                        li.style.cssText = 'padding:10px 0; border-bottom:1px solid #eee; display:flex; justify-content:between;';
                        li.innerHTML = `<div style="flex:1;"><strong>Товар/Услуга ID: ${item.product}</strong><br><span style="color:#6c757d;font-size:12px;">Количество: ${item.quantity} шт.</span></div><span style="font-weight:bold;color:#6c757d;">${item.price} BYN</span>`;
                        itemsList.appendChild(li);
                    });

                    const modal = document.getElementById('orderModal');
                    modal.classList.remove('d-none');
                    modal.style.display = 'flex'; // Принудительно открываем окно
                });
        }

        function closeModal() {
            const modal = document.getElementById('orderModal');
            modal.classList.add('d-none');
            modal.style.display = 'none'; // Скрываем окно
        }
    </script>
</body>
</html>
